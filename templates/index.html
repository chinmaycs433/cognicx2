<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Intelligence Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Email Intelligence Assistant</h1>
        <p><a href="/history">View Analysis History</a></p>
        
        <textarea id="emailInput" placeholder="Paste your email content here..." rows="10"></textarea>
        <button onclick="summarizeEmail()">Summarize Email</button>

        <div id="results" class="results">
            <h3>Results:</h3>
            <p><strong>Summary:</strong> <span id="summaryOutput"></span></p>
            <p><strong>Category:</strong> <span id="categoryOutput"></span></p>
            <p><strong>Priority:</strong> <span id="priorityOutput"></span></p>
            <p><strong>Sentiment:</strong> <span id="sentimentOutput"></span></p>
        </div>
    </div>
    <script>
    async function summarizeEmail() {
        const emailText = document.getElementById('emailInput').value;
        const response = await fetch('/summarize', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text: emailText })
        });
        const data = await response.json();
        document.getElementById('summaryOutput').innerText = data.summary;
        document.getElementById('categoryOutput').innerText = data.category;
        document.getElementById('priorityOutput').innerText = data.priority;
        document.getElementById('sentimentOutput').innerText = data.sentiment;
    }
    </script>
</body>
</html>
